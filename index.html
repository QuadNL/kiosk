<div class="top-bar">
    <img src="https://quadnl.github.io/kiosk/images/logo.png" class="logo" alt="Logo">
    <div id="date-time-container" style="text-align: right;">
        <div id="greeting" style="font-size: 1rem; color: #605e5c;">--</div>
        <div id="clock" style="font-size: 1.8rem; font-weight: 600; color: #323130;">--:--</div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Europe/Amsterdam' };
        
        // Begroeting bepalen
        const hour = now.getHours();
        let greeting = "Goedenacht";
        if (hour >= 6 && hour < 12) greeting = "Goedemorgen";
        else if (hour >= 12 && hour < 18) greeting = "Goedemiddag";
        else if (hour >= 18) greeting = "Goedenavond";

        const datumStr = now.toLocaleDateString('nl-NL', options);
        const tijdStr = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', hour12: false });

        document.getElementById('greeting').innerText = `${greeting}, het is vandaag ${datumStr}`;
        document.getElementById('clock').innerText = tijdStr;
    }
    
    setInterval(updateClock, 60000); // Update elke minuut is voldoende zonder seconden
    updateClock();

    // Systeem commando via Custom URI
    function sysCmd(action) {
        // Dit roept de custom protocol handler aan die we in Windows registreren
        window.location.href = "kioskcmd:" + action;
    }
</script>
